server:
  port: 8080

spring:
  application:
    name: attendance-system
    
  datasource:
    url: jdbc:mysql://localhost:3306/attendance_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: attendance-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        
  session:
    store-type: redis
    redis:
      namespace: attendance:session
    timeout: 7d
    
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: attendance-system-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 900000   # 15 minutes in ms
  refresh-token-expiration: 604800000  # 7 days in ms

attendance:
  check-in:
    start-offset-minutes: 30    # 上班前30分钟可打卡
    end-offset-minutes: 120    # 上班后2小时内可打卡
  location:
    max-distance-meters: 500   # 最大打卡距离(米)
    company-lat: 31.230416     # 公司纬度
    company-lng: 121.473701    # 公司经度
    
logging:
  level:
    root: INFO
    com.attendance: DEBUG
    org.springframework.security: INFO
